              - generic [ref=e432]:
                - generic [ref=e433]: § 1 · La escala
                - heading "Más de 300.000 hechos al año en 24 partidos" [level=3] [ref=e434]
                - generic [ref=e435]:
                  - paragraph [ref=e436]:
                    - text: El
                    - strong [ref=e437]: Conurbano Bonaerense
                    - text: concentra cerca de
                    - strong [ref=e438]: 10 millones
                    - text: de habitantes distribuidos en 24 partidos que rodean a la Ciudad de Buenos Aires. En el último año disponible del Sistema Nacional de Información Criminal (SNIC), se registraron
                    - strong [ref=e439]: más de 318 mil hechos
                    - text: delictivos en toda su superficie.
                  - paragraph [ref=e440]: "Esta cifra reúne 32 categorías oficiales: desde homicidios dolosos y robos hasta delitos contra la administración pública y contravenciones. El mapa a la derecha muestra el peso absoluto de cada partido en ese universo."
              - generic [ref=e441]:
                - generic [ref=e442]: § 2 · Un cuarto de siglo
                - 'heading "La serie larga: subas, caídas y un pico pre-pandemia" [level=3] [ref=e443]'
                - generic [ref=e444]:
                  - paragraph [ref=e445]:
                    - text: Entre
                    - strong [ref=e446]: 2000 y 2024
                    - text: la inseguridad en el Conurbano creció un 44% en volumen total, pero no en línea recta. La serie muestra un valle entre 2005 y 2010, una recuperación hasta 2014, y una
                    - strong [ref=e447]: aceleración sostenida
                    - text: desde 2016 que alcanzó su punto máximo en
                    - strong [ref=e448]: "2019"
                    - text: con 324 mil hechos.
                  - paragraph [ref=e449]:
                    - text: La pandemia produjo una caída transitoria del 17% en 2020, pero los registros volvieron rápidamente al rango alto. Desde 2021, el Conurbano se estabilizó cerca del
                    - strong [ref=e450]: máximo histórico
                    - text: — sin superarlo, pero sin retroceder.
              - generic [ref=e451]:
                - generic [ref=e452]: § 3 · Concentración territorial
                - heading "La Matanza explica 1 de cada 6 delitos del Conurbano" [level=3] [ref=e453]
                - generic [ref=e454]:
                  - paragraph [ref=e455]:
                    - text: La carga delictiva no se distribuye de forma uniforme.
                    - strong [ref=e456]: La Matanza
                    - text: —el partido más poblado de la Argentina— concentra por sí sola el
                    - strong [ref=e457]: 16% del total
                    - text: ", con más de 50 mil hechos registrados en el último año."
                  - paragraph [ref=e458]:
                    - text: Si sumamos los tres partidos con mayor volumen (La Matanza, Quilmes y Lomas de Zamora), llegan al
                    - strong [ref=e459]: 27,5% del Conurbano
                    - text: . En el extremo opuesto, los cinco partidos con menor volumen absoluto aportan en conjunto menos del 10%.
              - generic [ref=e460]:
                - generic [ref=e461]: § 4 · Homicidios vs. total
                - heading "Los homicidios dolosos cayeron mientras los delitos totales subían" [level=3] [ref=e462]
                - generic [ref=e463]:
                  - paragraph [ref=e464]:
                    - text: Los
                    - strong [ref=e465]: homicidios dolosos
                    - text: mostraron una tendencia descendente a lo largo de estos 25 años. La tasa promedio del Conurbano pasó de
                    - strong [ref=e466]: 14,4 por cada 100.000 habitantes
                    - text: en 2001 a valores entre
                    - strong [ref=e467]: 3,8 y 4,5
                    - text: en el último lustro.
                  - paragraph [ref=e468]:
                    - text: "En términos absolutos, los homicidios cayeron un 43% respecto al año 2000. El descenso no es homogéneo: coexiste con"
                    - strong [ref=e469]: picos locales
                    - text: —como el ciclo 2012-2014— y con partidos que mantienen tasas entre 5 y 8 /100k (José C. Paz, General San Martín, Moreno).
              - generic [ref=e470]:
                - generic [ref=e471]: § 5 · La composición cambió
                - heading "Lesiones, amenazas y ciberdelitos ganaron peso en la matriz delictiva" [level=3] [ref=e472]
                - generic [ref=e473]:
                  - paragraph [ref=e474]:
                    - text: El mix delictivo del Conurbano se transformó desde 2000. Los
                    - strong [ref=e475]: robos
                    - text: "—la categoría con mayor volumen— crecieron un 26%, pero perdieron peso relativo: representan hoy el 27% del total, frente al 31% de entonces."
                  - paragraph [ref=e476]:
                    - text: "En paralelo, crecieron categorías antes más marginales:"
                    - strong [ref=e477]: lesiones dolosas
                    - text: (+94%),
                    - strong [ref=e478]: amenazas
                    - text: (+77%),
                    - strong [ref=e479]: hurtos
                    - text: (+61%) y, sobre todo, la canasta
                    - strong [ref=e480]: otros delitos contra la propiedad
                    - text: (+160%), donde el SNIC agrupa las estafas virtuales.
              - generic [ref=e481]:
