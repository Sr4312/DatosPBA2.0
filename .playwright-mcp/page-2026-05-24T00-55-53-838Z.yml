            - generic [ref=e533]: Notas metodológicas
            - list [ref=e534]:
              - listitem [ref=e535]: Los totales suman las 32 categorías del SNIC a nivel parent-code (homicidios, robos, hurtos, amenazas, etc.), agrupando las subcategorías introducidas en 2023.
              - listitem [ref=e536]: La tasa se informa por 100.000 habitantes según la población del departamento en cada año de la serie SNIC.
